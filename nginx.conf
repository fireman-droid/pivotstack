# Kiro Stack Nginx 配置文件
# 使用方法：
# 1. 复制到服务器：sudo cp nginx.conf /etc/nginx/sites-available/kiro-stack
# 2. 创建软链接：sudo ln -s /etc/nginx/sites-available/kiro-stack /etc/nginx/sites-enabled/
# 3. 修改 server_name 为你的域名或 IP
# 4. 测试配置：sudo nginx -t
# 5. 重启 Nginx：sudo systemctl restart nginx

# API 限流配置
limit_req_zone $binary_remote_addr zone=kiro_api:10m rate=20r/s;

server {
    listen 80;
    server_name 8.148.251.30;  # 改成你的域名或 IP

    # 访问日志
    access_log /var/log/nginx/kiro-access.log;
    error_log /var/log/nginx/kiro-error.log;

    # 管理面板
    location /admin {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API 端点（需要 API Key）
    location / {
        # 限流：每秒 20 个请求，突发 50 个
        limit_req zone=kiro_api burst=50 nodelay;
        
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 支持流式响应
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        
        # 请求体大小限制
        client_max_body_size 100m;
        
        # SSE 支持
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }
}
