services:
  clash-meta:
    image: metacubex/mihomo:latest
    container_name: clash-meta
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./clash/config.yaml:/root/.config/mihomo/config.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=3", "--proxy=on", "http://www.gstatic.com/generate_204"]
      interval: 30s
      timeout: 5s
      retries: 3

  kiro-gateway:
    build: ./kiro-gateway
    image: kiro-gateway-local:latest
    container_name: kiro-gateway
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8001"
    environment:
      - PROXY_API_KEY=${INTERNAL_API_KEY}
      - VPN_PROXY_URL=http://host.docker.internal:7890
      - DEBUG_MODE=${DEBUG_MODE:-off}
      - SKIP_STARTUP_CREDENTIAL_CHECK=true
      - SERVER_PORT=8001
      - SERVER_HOST=0.0.0.0

  kiro-go:
    build: ./kiro-go
    container_name: kiro-go
    restart: unless-stopped
    depends_on:
      - kiro-gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8088:8088"
    volumes:
      - ./kiro-go/data:/app/data
    environment:
      - CONFIG_PATH=/app/data/config.json
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - KIRO_GATEWAY_BASE=http://kiro-gateway:8001
      - KIRO_GATEWAY_API_KEY=${INTERNAL_API_KEY}
      - VPN_PROXY_URL=http://host.docker.internal:7890
      - HTTP_PROXY=http://host.docker.internal:7890
      - HTTPS_PROXY=http://host.docker.internal:7890
      - PORT=8088
      - HOST=0.0.0.0
