services:
  kiro-go:
    build: .
    ports:
      - "8990:8080"
    volumes:
      - ./data:/app/data
    environment:
      - CONFIG_PATH=/app/data/config.json
      # 走宿主机的 clash 代理（http://host.docker.internal:7897）
      # Windows / Mac Docker Desktop 自带 host.docker.internal；Linux 需要 extra_hosts 声明
      - VPN_PROXY_URL=http://host.docker.internal:7897
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
